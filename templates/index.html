<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Dashboard — Teams SSO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent-blue: #8ab4f8;
            --accent-green: #81c995;
            --accent-red: #f28b82;
            --accent-orange: #fcad70;
            --accent-purple: #c58af9;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(102,126,234,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -300px; left: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(197,138,249,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            background: rgba(15,17,23,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0;
            z-index: 100;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
        }
        .header-brand .icon {
            width: 36px; height: 36px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 18px;
        }

        .login-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 6px 14px 6px 8px;
            border-radius: 24px;
        }
        .user-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .user-avatar.admin { background: var(--gradient-1); }
        .user-avatar.manager { background: var(--gradient-2); }
        .user-avatar.staff { background: var(--gradient-3); }

        .user-info { line-height: 1.3; }
        .user-name { font-size: 13px; font-weight: 500; }
        .user-role {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .main { padding: 32px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #e8eaed, #9aa0a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

        .permissions-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .perm-label { font-size: 13px; color: var(--text-secondary); margin-right: 4px; }
        .perm-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .perm-badge.allowed { background: rgba(129,201,149,0.15); color: var(--accent-green); border: 1px solid rgba(129,201,149,0.25); }
        .perm-badge.denied { background: rgba(242,139,130,0.1); color: var(--accent-red); border: 1px solid rgba(242,139,130,0.15); opacity: 0.6; text-decoration: line-through; }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .chart-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s forwards;
        }
        .chart-card:nth-child(1) { animation-delay: 0.1s; }
        .chart-card:nth-child(2) { animation-delay: 0.2s; }
        .chart-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .chart-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: var(--shadow);
        }

        .chart-card.locked { opacity: 0.45; pointer-events: none; }
        .chart-card.locked .chart-header::after {
            content: '🔒 Không có quyền';
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            background: rgba(242,139,130,0.15);
            color: var(--accent-red);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .chart-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .chart-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .chart-title { font-size: 15px; font-weight: 600; }
        .chart-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .chart-body { padding: 20px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 14px;
            transition: background 0.2s;
        }
        .stat-item:hover { background: rgba(255,255,255,0.06); }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.orange { color: var(--accent-orange); }
        .stat-value.purple { color: var(--accent-purple); }
        .stat-value.red { color: var(--accent-red); }

        .revenue-list { display: flex; flex-direction: column; gap: 10px; }
        .revenue-row { display: flex; align-items: center; gap: 12px; }
        .revenue-month { font-size: 12px; color: var(--text-secondary); width: 60px; flex-shrink: 0; }
        .revenue-bar-bg { flex: 1; height: 24px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
        .revenue-bar { height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 0; }
        .revenue-val { font-size: 12px; font-weight: 500; width: 70px; text-align: right; flex-shrink: 0; color: var(--text-secondary); }

        .threat-badge { display: inline-block; padding: 6px 16px; border-radius: 8px; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
        .threat-LOW { background: rgba(129,201,149,0.15); color: var(--accent-green); }
        .threat-MEDIUM { background: rgba(252,173,112,0.15); color: var(--accent-orange); }
        .threat-HIGH { background: rgba(242,139,130,0.15); color: var(--accent-red); }

        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 13px;
            box-shadow: var(--shadow);
            z-index: 200;
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.3s;
            pointer-events: none;
            max-width: 380px;
        }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast.error { border-left: 3px solid var(--accent-red); }
        .toast.success { border-left: 3px solid var(--accent-green); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 15px; }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .main { padding: 20px 16px; }
            .charts-grid { grid-template-columns: 1fr; }
            .header { padding: 0 16px; }
            .stat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="icon">📊</div>
            <span>Chart Dashboard</span>
        </div>
        <div class="login-panel" id="loginPanel">
            <span id="authStatus" style="font-size:13px;color:var(--text-secondary)">⏳ Đang xác thực...</span>
            <div class="user-badge" id="userBadge" style="display:none">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">—</div>
                    <div class="user-role" id="userRole">—</div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <h1 class="page-title">Dashboard Biểu đồ</h1>
        <p class="page-subtitle">Hệ thống RBAC — Xác thực qua Microsoft Teams SSO.</p>
        <div class="permissions-bar" id="permBar" style="display:none"></div>
        <div id="content"><div class="spinner"></div></div>
    </main>

    <div class="toast" id="toast"></div>

    <!-- Microsoft Teams SDK -->
    <script src="https://res.cdn.office.net/teams-js/2.25.0/js/MicrosoftTeams.min.js"></script>

    <script>
        const API = '';
        const CHARTS = [
            { id: 'tong-quan', name: 'Tổng quan', icon: '📈', gradient: 'linear-gradient(135deg,#667eea,#764ba2)', desc: 'Số liệu tổng hợp hệ thống' },
            { id: 'doanh-thu', name: 'Doanh thu', icon: '💰', gradient: 'linear-gradient(135deg,#f093fb,#f5576c)', desc: 'Biểu đồ doanh thu theo tháng' },
            { id: 'bao-mat', name: 'Bảo mật', icon: '🛡️', gradient: 'linear-gradient(135deg,#4facfe,#00f2fe)', desc: 'Giám sát an ninh hệ thống' },
        ];

        const userBadge = document.getElementById('userBadge');
        const content = document.getElementById('content');
        const permBar = document.getElementById('permBar');
        const loginPanel = document.getElementById('loginPanel');
        let ssoToken = null;
        let allowedCharts = [];

        function getAuthHeaders() {
            return ssoToken ? { 'Authorization': `Bearer ${ssoToken}` } : {};
        }

        // Khởi tạo Teams SSO
        async function init() {
            try {
                await microsoftTeams.app.initialize();
                ssoToken = await microsoftTeams.authentication.getAuthToken();
                document.getElementById('authStatus').textContent = '🔐 Teams SSO';
                document.getElementById('authStatus').style.color = 'var(--accent-green)';
                await loadDashboard();
            } catch (e) {
                content.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>App cần chạy trong Microsoft Teams.</p><p style="font-size:12px;margin-top:8px;opacity:0.6">' + (e.message || e) + '</p></div>';
                document.getElementById('authStatus').textContent = '❌ Lỗi xác thực';
                document.getElementById('authStatus').style.color = 'var(--accent-red)';
            }
        }

        async function loadDashboard() {
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await fetch(`${API}/api/my-charts`, { headers: getAuthHeaders() });
                const data = await res.json();
                if (!data.success) {
                    // Gọi debug endpoint để lấy thông tin chi tiết
                    let debugInfo = '';
                    try {
                        const dbg = await fetch(`${API}/api/debug-token`, { headers: getAuthHeaders() });
                        const dbgData = await dbg.json();
                        debugInfo = '<pre style="text-align:left;font-size:11px;margin-top:16px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;overflow-x:auto">' + JSON.stringify(dbgData, null, 2) + '</pre>';
                    } catch(e) {}
                    content.innerHTML = '<div class="empty-state"><div class="icon">🚫</div><p>' + (data.message || 'Lỗi') + '</p>' + debugInfo + '</div>';
                    return;
                }

                const role = data.user.role;
                userBadge.style.display = 'flex';
                document.getElementById('userName').textContent = data.user.name;
                document.getElementById('userRole').textContent = role;
                const avatar = document.getElementById('userAvatar');
                avatar.textContent = data.user.name.charAt(0);
                avatar.className = 'user-avatar ' + role;
                allowedCharts = data.allowed_charts;
                renderPermBar(allowedCharts);
                await renderCharts();
            } catch(e) {
                content.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Lỗi kết nối server</p><p style="font-size:12px;opacity:0.6">' + e + '</p></div>';
            }
        }

        function renderPermBar(allowed) {
            permBar.style.display = 'flex';
            permBar.innerHTML = '<span class="perm-label">Quyền truy cập:</span>' +
                CHARTS.map(c => `<span class="perm-badge ${allowed.includes(c.id) ? 'allowed' : 'denied'}">${c.name}</span>`).join('');
        }

        async function renderCharts() {
            const grid = document.createElement('div');
            grid.className = 'charts-grid';
            for (const chart of CHARTS) {
                const hasAccess = allowedCharts.includes(chart.id);
                const card = document.createElement('div');
                card.className = 'chart-card' + (hasAccess ? '' : ' locked');
                card.innerHTML = `
                    <div class="chart-header">
                        <div class="chart-icon" style="background:${chart.gradient}">${chart.icon}</div>
                        <div><div class="chart-title">${chart.name}</div><div class="chart-desc">${chart.desc}</div></div>
                    </div>
                    <div class="chart-body">${hasAccess ? '<div class="spinner"></div>' : '<p style="color:var(--text-secondary);font-size:13px;text-align:center;padding:20px 0">Không có quyền.</p>'}</div>
                `;
                grid.appendChild(card);
                if (hasAccess) fetchChart(chart.id, card.querySelector('.chart-body'));
            }
            content.innerHTML = '';
            content.appendChild(grid);
        }

        async function fetchChart(chartId, container) {
            try {
                const res = await fetch(`${API}/api/charts/${chartId}`, { headers: getAuthHeaders() });
                const data = await res.json();
                if (!data.success) { container.innerHTML = `<p style="color:var(--accent-red)">${data.message}</p>`; return; }
                container.innerHTML = renderChartData(chartId, data.data);
                if (chartId === 'doanh-thu') {
                    setTimeout(() => container.querySelectorAll('.revenue-bar').forEach(b => b.style.width = b.dataset.width), 100);
                }
            } catch (e) {
                container.innerHTML = '<p style="color:var(--accent-red)">Lỗi tải dữ liệu.</p>';
            }
        }

        function renderChartData(id, data) {
            if (id === 'tong-quan') {
                return `<div class="stat-grid">
                    <div class="stat-item"><div class="stat-label">Tổng người dùng</div><div class="stat-value blue">${data.total_users.toLocaleString()}</div></div>
                    <div class="stat-item"><div class="stat-label">Phiên hoạt động</div><div class="stat-value green">${data.active_sessions}</div></div>
                    <div class="stat-item" style="grid-column:1/-1"><div class="stat-label">Tổng doanh thu</div><div class="stat-value orange">${data.total_revenue}</div></div>
                </div>`;
            }
            if (id === 'doanh-thu') {
                const max = Math.max(...data.monthly_revenue.map(r => r.value));
                const colors = ['#667eea','#f093fb','#4facfe','#81c995'];
                return `<div class="revenue-list">${data.monthly_revenue.map((r, i) =>
                    `<div class="revenue-row">
                        <span class="revenue-month">${r.month}</span>
                        <div class="revenue-bar-bg"><div class="revenue-bar" data-width="${(r.value/max*100).toFixed(0)}%" style="background:${colors[i%4]}"></div></div>
                        <span class="revenue-val">${(r.value/1e6).toFixed(0)}M</span>
                    </div>`
                ).join('')}</div>`;
            }
            if (id === 'bao-mat') {
                return `<div class="stat-grid">
                    <div class="stat-item"><div class="stat-label">Đăng nhập thất bại</div><div class="stat-value red">${data.failed_logins_today}</div></div>
                    <div class="stat-item"><div class="stat-label">IP bị chặn</div><div class="stat-value orange">${data.blocked_ips}</div></div>
                    <div class="stat-item" style="grid-column:1/-1"><div class="stat-label">Mức độ đe dọa</div><div class="threat-badge threat-${data.threat_level}">${data.threat_level}</div></div>
                </div>`;
            }
            return '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.className = 'toast', 3000);
        }

        init();
    </script>
</body>
</html>
